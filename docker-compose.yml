services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    stdin_open: true
    tty: true
    environment:
      - INPUT_PATH=/app/images/
      - SERVER_PORT=:8080
    volumes:
      - ./images:/app/images
    restart: always

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    environment:
      - SERVER_ADDR=server:8080
    depends_on:
      - server
    scale: 1
    restart: on-failure